defaults:
  - /habitat_baselines: habitat_baselines_rl_config_base
  - /benchmark/nav/objectnav: objectnav_hm3d
  - /habitat/task/lab_sensors:
      - base_explorer
      - compass_sensor
      - gps_sensor
      - heading_sensor
      - frontier_sensor
  - /habitat/task/measurements:
    - frontier_exploration_map
    - traveled_stairs
  - /habitat_baselines/rl/policy: vlfm_policy
  - _self_

habitat:
  environment:
    iterator_options:
      max_scene_repeat_steps: 50000
  task:
    success_reward: 2.5
    slack_reward: -1e-3
    lab_sensors:
      base_explorer:
        turn_angle: 30

habitat_baselines:
  evaluate: True
  eval_ckpt_path_dir: data/dummy_policy.pth
  num_environments: 1
  load_resume_state_config: False

  test_episode_count: -1
  checkpoint_folder: data/new_checkpoints
  video_dir: data/vd_out

  trainer_name: "ver"
  torch_gpu_id: 0
  tensorboard_dir: data/tb
  video_fps: 30
  test_episode_count: -1

  rl:
    policy:
      name: "HabitatVoxelITMPolicy"  # 使用3D体素地图策略
      
      # 3D体素地图参数
      voxel_size: 0.1                    # 体素大小（米）
      voxel_min_height: -2.0              # 最低高度（米）
      voxel_max_height: 3.0               # 最高高度（米）  
      voxel_max_range: 10.0               # 最大感知距离（米）
      enable_3d_planning: True            # 启用3D路径规划
      planning_height_clearance: 0.5      # 规划高度余量（米）
      
      # 基础VLFM参数
      object_detector: "grounding_dino"
      coverage_threshold: 0.97
      map_size_in_meters: 50.0
      map_pixels_per_meter: 20
      frontier_dilate_occ: True
      dilate_explored_kernel_size: 2
      value_map_max_depth: 7.0
      min_depth: 0.5
      nav_depth_max_depth: 10.0
      nav_depth_min_depth: 0.1
      nav_depth_width: 320
      nav_depth_height: 240
      nav_rgb_width: 320
      nav_rgb_height: 240
      nav_rgb_fov: 79
      nav_depth_fov: 79
      
      # 目标检测参数  
      grounding_dino_threshold: 0.6
      yolo_threshold: 0.6
      load_yolo: True
      
      # 语义价值地图参数
      text_prompt: "Is this image showing a target_object?"
      
      # 导航参数
      pointnav_stop_radius: 0.95
      max_steps: 1000
      goal_on_same_floor: False
      dist_thresh: 0.36
      success_distance: 1.0
      
      # 性能优化参数
      subsample_factor: 2               # 深度图子采样因子
      num_threads: 4                    # 体素地图更新线程数
      enable_optimizations: True        # 启用性能优化
      
# 环境特定参数
eval_split: "val"